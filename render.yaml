services:
  - type: web
    name: wividai-api
    env: node
    plan: free
    region: oregon
    nodeVersion: 20
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MASTER_API_KEY
        generateValue: true
      - key: MASTER_SECRET
        generateValue: true
    healthCheckPath: /
    autoDeploy: false
